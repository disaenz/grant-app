version: '3.8'

services:
  db:
    image: postgres:13
    container_name: postgres-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - ../volume:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    container_name: grant-api
    build:
      context: ../grant-api
      dockerfile: Dockerfile.local
    ports:
      - "8000:8080"
    environment:
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql+asyncpg://myuser:mypassword@db:5432/mydb
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    container_name: grant-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api
    restart: unless-stopped
